<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cheko's Space</title>
    <meta
      name="description"
      content="Cheko's Space is an immersive portfolio with expressive motion, editorial typography, and beautifully paced work reveals."
    >
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="home">
    <div id="home-galaxy-bg" class="home-galaxy-bg" aria-hidden="true"></div>
    <div class="page-shell">
      <header class="site-header">
        <nav class="site-header-inner" data-menu-shell aria-label="Primary">
          <div class="menu-top">
            <div class="menu-bar">
              <a class="brand" href="/" aria-label="Cheko's Space home">
                <span class="brand-dot" aria-hidden="true"></span>
                <span>Cheko's Space</span>
              </a>
              <div class="site-actions">
                <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch light mode">
                  <span class="theme-toggle-track" aria-hidden="true">
                    <span class="theme-toggle-thumb"></span>
                  </span>
                  <span class="theme-toggle-label">Light</span>
                </button>
                <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false" aria-label="Open menu">
                  <span aria-hidden="true"></span>
                  <span aria-hidden="true"></span>
                </button>
              </div>
            </div>
          </div>
          <div class="menu-items-wrap">
            <div class="nav-links" data-nav>
              <a href="/" data-nav-link>Home</a>
              <a href="/contact/" data-nav-link>Contact</a>
            </div>
          </div>
          <div class="menu-background" aria-hidden="true"></div>
          <div class="menu-close-layer" data-menu-close aria-hidden="true"></div>
        </nav>
      </header>

      <main>
        <section class="hero-poster reveal" data-hero-surface>
          <div class="hero-poster-inner">
            <div id="home-hero-text" class="hero-title-mount" aria-label="CHEKO'S SPACE"></div>
            <div class="hero-foot">
              <span class="scroll-note">
                <span>Scroll down</span>
                <span class="scroll-indicator" aria-hidden="true"></span>
              </span>
            </div>
          </div>
        </section>

        <section class="about-section section-divider reveal">
          <div class="section-inner">
            <h2 class="sr-only">About</h2>
            <div class="about-layout">
              <div class="about-header">
                <div class="about-label-wrap">
                  <p class="about-label">(About.)</p>
                </div>
                <div class="about-aside">
                  <div class="about-visual-wrap">
                    <div class="about-visual">
                      <img
                        src="https://cdn.prod.website-files.com/68f5e7e733480946aa936748/6974289622893ca412fddeb9_DSC_1952.avif"
                        alt="Portrait editorial visual"
                        loading="lazy"
                      >
                    </div>
                  </div>
                  <div class="about-player" aria-label="Now playing" data-music-player>
                    <div class="about-player-top">
                      <span class="about-player-time" data-player-time>0:00</span>
                      <span class="about-player-duration" data-player-duration>/ 0:00</span>
                    </div>
                    <button class="about-player-disc" type="button" data-player-toggle aria-expanded="false" aria-label="Reveal player details">
                      <div class="about-player-disc-image" aria-hidden="true"></div>
                      <img
                        class="about-player-center-image"
                        src="https://i.scdn.co/image/ab67616d0000b27341598b114f8f3b4bcf5742d9"
                        alt=""
                        data-player-cover
                        loading="lazy"
                      >
                    </button>
                    <div class="about-player-info">
                      <p class="about-player-track" data-player-track>The Line of Least Resistance</p>
                      <div class="about-player-eq" aria-hidden="true">
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                      </div>
                      <p class="about-player-artist" data-player-artist>Sybreed</p>
                      <div class="about-player-progress" aria-hidden="true">
                        <span class="about-player-progress-fill" data-player-progress-fill></span>
                        <span class="about-player-progress-thumb" data-player-progress-thumb></span>
                      </div>
                    </div>
                    <audio data-player-audio muted autoplay playsinline preload="metadata"></audio>
                  </div>
                </div>
              </div>
              <div class="about-content">
                <div
                  id="about-main-text"
                  class="about-main-text"
                  aria-label="I shape identities and guide art direction for ambitious clients seeking timeless sophistication with a modern edge. Through editorial sensibility and narrative depth, my work turns vision into immersive experiences that resonate and endure."
                ></div>
                <div id="about-tool-loop" class="about-tool-loop-mount" aria-label="Creative tool stack"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="editorial-section section-divider">
          <div class="section-inner reveal">
            <div class="about-label-wrap">
              <p class="about-label">(Works.)</p>
            </div>
            <div class="gallery-strip" data-home-gallery></div>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <div class="footer-inner">
          <div class="footer-stage">
            <div class="footer-grid">
              <div class="footer-brand-block">
                <p class="footer-name">
                  <span>Mariam</span>
                  <span>Chekurishvili</span>
                </p>
              </div>
              <div class="footer-side">
                <div class="footer-nav-block">
                  <p class="footer-kicker">Links</p>
                  <div class="footer-links">
                    <a href="/about/">About</a>
                  </div>
                </div>
                <div class="footer-meta">
                  <span>© <span data-year></span> Mariam Chekurishvili</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </footer>
    </div>

    <script type="module" src="/script.js"></script>
    <script type="module" src="/src/home-hero-entry.jsx"></script>
  </body>
</html>
